<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Silver AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">

    <header class="topbar">
      <h1>Silver AI</h1>
      <select id="mode">
        <option value="code">Code</option>
        <option value="addon">Minecraft Bedrock Addon</option>
        <option value="texture">Pixel Texture</option>
      </select>
    </header>

    <main id="chatWindow"></main>

    <footer class="inputBar">
      <textarea id="prompt" placeholder="Ask Silver AI..."></textarea>
      <button id="sendBtn">Send</button>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
